<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة DFH</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --accent-color: #0056b3;
            --trans-bg: #f8f9fa;
            --trans-border: #0056b3;
            --nav-bg: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 90px; min-height: 100vh; overflow-x: hidden;}
        
        .content-container { padding: 20px 20px; max-width: 800px; margin: 0 auto; direction: ltr; }
        
        /* كلاسات المحتوى الأساسية قابلة للتعديل */
        .editable-block { position: relative; padding: 5px; margin-bottom: 20px; border: 1px solid transparent; transition: all 0.2s;}
        
        .text-block { border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .title-text { font-weight: bold; font-size: 1.6rem; color: #000; margin-bottom: 15px; display: block; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; direction: ltr; }
        .sub-title { font-weight: bold; font-size: 1.4rem; color: var(--accent-color); margin-top: 20px; margin-bottom: 10px; display: block; direction: ltr; }
        .english-paragraph { line-height: 2.2; font-size: 1.25rem; color: #333; margin-bottom: 8px; text-align: left; }
        
        .interactive-word { cursor: pointer; border-bottom: 1px dotted #999; transition: background 0.2s; position: relative; display: inline-block;}
        .interactive-word:hover { background-color: #e3f2fd; color: var(--accent-color); }
        
        .toggle-trans-btn { background: none; border: none; color: #666; font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 0; direction: rtl; width: 100%; }
        .inline-translation { display: none; background-color: var(--trans-bg); color: #000; padding: 12px; border-radius: 8px; margin-top: 5px; border-right: 4px solid var(--trans-border); font-family: 'Cairo', sans-serif; font-size: 1.15rem; line-height: 1.6; direction: rtl; text-align: justify; }

        .lecture-image-container { width: 100%; margin: 20px 0; text-align: center; }
        .lecture-image { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; transition: all 0.2s;}

        /* ================= أزرار التعديل والطباعة العائمة ================= */
        .top-buttons-container { position: fixed; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .action-btn-float { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 0.9rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s; display: flex; align-items: center; gap: 5px;}
        .action-btn-float.edit-mode { background: #ff9800; }
        .action-btn-float:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: var(--nav-bg); border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; direction: rtl; }
        .nav-btn { background: var(--accent-color); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background-color: #e0e0e0; color: #999; }
        .page-counter { font-family: 'Cairo', sans-serif; font-weight: bold; color: #555; background: #e9ecef; padding: 5px 15px; border-radius: 15px; }

        .slide-page { display: none; }
        .slide-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        /* ================= لوحة تحكم التعديل (Editor Toolbar) ================= */
        body.editing-active .editable-block { border: 2px dashed #ff9800; border-radius: 8px; }
        .editor-toolbar { display: none; position: absolute; top: -35px; left: 0; background: #333; color: white; border-radius: 5px; padding: 5px 10px; z-index: 100; flex-wrap: wrap; gap: 8px; direction: ltr; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3);}
        body.editing-active .editor-toolbar { display: flex; }
        .tool-btn { background: #555; color: white; border: none; border-radius: 3px; padding: 5px 10px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;}
        .tool-btn:hover { background: #ff9800; }

        /* ================= إعدادات الطباعة السحرية للـ PDF ================= */
        @page { size: A4 portrait; margin: 0; }
        @media print {
            body, html { width: 100%; height: 100%; background: white; color: black; margin: 0; padding: 0; }
            .bottom-nav, .sheet-overlay, .toggle-trans-btn, .top-buttons-container, .editor-toolbar { display: none !important; }
            .editable-block { border: none !important; margin-bottom: 0 !important; padding: 0 !important;}
            .content-container { max-width: 100%; padding: 0; margin: 0; }
            
            .slide-page { 
                display: block !important; 
                opacity: 1 !important; 
                visibility: visible !important; 
                position: relative !important; 
                page-break-after: always !important; 
                page-break-inside: avoid !important;
                width: 100% !important;
                height: 290mm !important; 
                overflow: hidden !important; 
                padding: 10px !important; 
                margin: 0 !important; 
                box-sizing: border-box; 
            }
            
            .slide-content-wrapper { transform-origin: top center; width: 100%; }
            .text-block { border-bottom: 1px dashed #ccc; margin-bottom: 8px !important; padding-bottom: 5px !important;}
            .lecture-image-container { margin: 8px 0 !important; }
            
            .inline-translation { display: block !important; font-size: 11pt !important; line-height: 1.5 !important; border-top: 1px dashed #bbb; margin-top: 8px !important; padding-top: 5px !important; color: #444; direction: rtl;}
            
            .interactive-word { border: none !important; position: relative; display: inline-block; margin-top: 22px;}
            .interactive-word[data-trans]::after {
                content: attr(data-trans);
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                font-size: 8pt !important;
                color: #cc0000 !important; 
                font-family: 'Cairo', sans-serif;
                white-space: nowrap;
                font-weight: bold;
                direction: rtl;
            }
        }
    </style>
</head>

            🛠️ تفعيل التعديل
        </button>
        <button class="action-btn-float" id="mainPrintBtn" onclick="printLecture()">

        </button>
    </div>

    <div class="content-container" id="contentArea"></div>

    <div class="bottom-nav">
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">التالي &#8592;</button>
        <div class="page-counter" id="pageIndicator">1</div>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8594; السابق</button>
    </div>

    <script>
        const dictionary = {};
        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding", "trans": "1.16 ترميز الإشارة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "To explain this subject clearly and easy assimilation, suppose some of the", "trans": "ولشرح هذا الموضوع بشكل واضح وسهل الاستيعاب، افترض بعضا من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "assumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,", "trans": "الافتراضات: النظر في صورة محورية للدماغ باستخدام مغناطيس 1.5 تسلا. أيضًا،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "we work with a homogeneous magnetic field, which covers the whole body from", "trans": "نحن نعمل بمجال مغناطيسي متجانس يغطي الجسم كله منه", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "head to toe. (This is quite different in reality, where there is only a homogenous", "trans": "الرأس إلى أخمص القدمين. (وهذا يختلف تماما في الواقع، حيث لا يوجد سوى متجانس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "sphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,", "trans": "كرة قطرها 40 سم في المركز المتساوي (مركز تجويف التصوير بالرنين المغناطيسي) للمغناطيس،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "but this assumption easy to the explanation and the idea explained). Just as important", "trans": "ولكن هذا الافتراض سهل الشرح وشرح الفكرة). بنفس القدر من الأهمية", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "as the strength of the main magnet is its precision. The straightness of the magnetic", "trans": "لأن قوة المغناطيس الرئيسي هي دقته. استقامة المغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "lines within the center (or, as it is technically known, the iso-center) of the magnet", "trans": "خطوط داخل المركز (أو، كما هو معروف تقنيًا، مركز الأيزو) للمغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "needs to be near-perfect. This is known as homogeneity. Fluctuations", "trans": "يجب أن تكون شبه مثالية. وهذا ما يعرف بالتجانس. التقلبات", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(inhomogeneities in the field strength) within the scan region should be less than", "trans": "(عدم التجانس في شدة المجال) داخل منطقة المسح يجب أن يكون أقل من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "three parts per million (3 ppm). When we put a patient in the magnet, all the protons,", "trans": "ثلاثة أجزاء في المليون (3 جزء في المليون). عندما نضع مريضًا في المغناطيس، جميع البروتونات،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "from head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz", "trans": "من الرأس إلى أخمص القدمين، محاذاة مع B0. أنها تدور على تردد لارمور 63.6 ميغاهيرتز", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(Figure 28).", "trans": "(الشكل 28).", "isTitle": false, "isSubTitle": true}, {"type": "image", "src": "images/img_7a010798.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "إذا استخدمنا نبضة RF مثيرة تبلغ 90 درجة لقلب المغنطة إلى المستوى xy، إذن", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "سوف تتفاعل جميع البروتونات وتعيد الإشارة. لن يكون لدينا أدنى فكرة عن مكان", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "تأتي الإشارة من: من الرأس أو أخمص القدمين.", "isTitle": false, "isSubTitle": false}]}, {"content": [{"type": "text", "text": "1.16.1 Slice Encoding Gradient", "trans": "1.16.1 تدرج ترميز الشريحة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "The magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is", "trans": "يتم تطبيق تدرج المجال المغناطيسي (على سبيل المثال، التدرج Z) مؤقتًا (التدرج Z هو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "switched on) at the same time as the RF pulse (see figure 29).", "trans": "قيد التشغيل) في نفس الوقت الذي يتم فيه نبض التردد اللاسلكي (انظر الشكل 29).", "isTitle": false, "isSubTitle": false}, {"type": "image", "src": "images/img_4efc932d.jpg"}, {"type": "text", "text": "This will generate an additional magnetic field in the Z-direction, which is", "trans": "سيؤدي هذا إلى توليد مجال مغناطيسي إضافي في الاتجاه Z، وهو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "superimposed on Bo. The indication +Gz in Figure 29 means there is a slightly", "trans": "فرضه على بو. الإشارة +Gz في الشكل 29 تعني وجود القليل", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "stronger Bo field in the head as there is in the iso-center of the magnet. A stronger", "trans": "مجال بو أقوى في الرأس كما يوجد في مركز الأيزو للمغناطيس. أقوى", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "Bo field means a higher Larmor frequency. Along the entire the slope of the gradient", "trans": "حقل Bo يعني تردد لارمور أعلى. على طول منحدر التدرج بأكمله", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "there is a different Bo field and consequently the protons spin at slightly different", "trans": "يوجد مجال Bo مختلف وبالتالي تدور البروتونات بشكل مختلف قليلاً", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies. Therefore, the protons in the head will spin slightly faster than the ones", "trans": "الترددات. ولذلك، فإن البروتونات الموجودة في الرأس سوف تدور بشكل أسرع قليلاً من تلك الموجودة في الرأس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "in the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that", "trans": "في مركز الأيزو. والعكس ينطبق على البروتونات الموجودة في القدمين. ويبين الشكل 28 ذلك", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "the protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet", "trans": "تدور البروتونات الموجودة في القدم الآن بسرعة 63.5 ميجاهرتز، وهي تلك الموجودة في المركز المتساوي للمغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "still at 63.6 MHz and the ones in the head with 63.7 MHz", "trans": "لا يزال عند 63.6 ميجا هرتز وتلك الموجودة في الرأس بتردد 63.7 ميجا هرتز", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "This means we can \"pick out\" the section which we want to excite by choosing the", "trans": "هذا يعني أنه يمكننا 'انتقاء' القسم الذي نريد إثارة اهتمامه عن طريق اختيار", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "right frequency range of RF excitation pulse. The section which contains Larmor", "trans": "نطاق التردد الصحيح لنبض الإثارة RF. القسم الذي يحتوي على Larmor", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies which match the frequencies of the oscillating magnetic field will", "trans": "الترددات التي تتوافق مع ترددات المجال المغناطيسي المتذبذب", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "respond. An MRI signal will be generated only from that section of the patient. This", "trans": "يرد. سيتم إنشاء إشارة التصوير بالرنين المغناطيسي فقط من هذا القسم من المريض. هذا", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "is called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is", "trans": "يسمى تشفير الشريحة أو اختيار الشريحة. عادةً ما يكون تدرج اختيار الشريحة هو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "applied in the z-axis-the head-foot direction in the scanner. But because a gradient", "trans": "يتم تطبيقه في المحور z-اتجاه الرأس والقدم في الماسح الضوئي. ولكن بسبب التدرج", "isTitle": false, "isSubTitle": false}]}];
        let currentIndex = 0;
        let isEditing = false;

        function renderPage() {
            try {
                const container = document.getElementById('contentArea');
                let html = '';
                
                pages.forEach((pageData, pageIndex) => {
                    let activeClass = pageIndex === currentIndex ? 'active' : '';
                    html += `<div class="slide-page ${activeClass}" id="page-${pageIndex}"><div class="slide-content-wrapper" id="wrapper-${pageIndex}">`;
                    
                    pageData.content.forEach((item, idx) => {
                        let blockId = `block-${pageIndex}-${idx}`;
                        html += `<div class="editable-block" id="${blockId}">`;
                        
                        // إضافة لوحة تحكم التعديل
                        html += `
                            <div class="editor-toolbar">
                                <button class="tool-btn" onclick="moveElement('${blockId}', -1)" title="تحريك لأعلى">⬆️</button>
                                <button class="tool-btn" onclick="moveElement('${blockId}', 1)" title="تحريك لأسفل">⬇️</button>
                                ${item.type === 'image' ? `
                                    <button class="tool-btn" onclick="resizeImage('${blockId}', 10)">➕ تكبير</button>
                                    <button class="tool-btn" onclick="resizeImage('${blockId}', -10)">➖ تصغير</button>
                                    <button class="tool-btn" onclick="alignElement('${blockId}', 'left')">⬅️</button>
                                    <button class="tool-btn" onclick="alignElement('${blockId}', 'center')">⏺️</button>
                                    <button class="tool-btn" onclick="alignElement('${blockId}', 'right')">➡️</button>
                                ` : `
                                    <button class="tool-btn" onclick="resizeText('${blockId}', 1)">A+</button>
                                    <button class="tool-btn" onclick="resizeText('${blockId}', -1)">A-</button>
                                `}
                            </div>
                        `;

                        if (item.type === 'image') {
                            html += `<div class="lecture-image-container" style="text-align:center;"><img src="${item.src}" class="lecture-image" style="width:100%;"></div>`;
                        } else {
                            let cssClass = "english-paragraph";
                            if (item.isTitle) cssClass = "title-text";
                            if (item.isSubTitle) cssClass = "sub-title";

                            let formattedBlock = '';
                            let actualLines = item.text.split('\n');
                            
                            actualLines.forEach(line => {
                                let interactiveText = '';
                                let words = line.split(' ');
                                words.forEach(word => {
                                    let clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                                    if (clean && /[a-z]/i.test(clean)) {
                                        let safeWord = word.replace(/'/g, "\'").replace(/"/g, "&quot;");
                                        let transAttr = dictionary[clean] ? `data-trans="${dictionary[clean]}"` : '';
                                        // تم إزالة النافذة المنبثقة لأن كل الكلمات ستترجم تلقائياً للـ PDF
                                        interactiveText += `<span class="interactive-word" data-clean="${clean}" ${transAttr}>${word}</span> `;
                                    } else {
                                        interactiveText += `${word} `; 
                                    }
                                });
                                formattedBlock += `<div style="font-size: 1.25rem;">${interactiveText}</div>`;
                            });

                            let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                            html += `
                                <div class="text-block">
                                    <div class="${cssClass}">
                                        ${formattedBlock}
                                    </div>
                                    <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${pageIndex}-${idx}')">
                                        إظهار الترجمة &#11015;
                                    </button>
                                    <div id="trans-${pageIndex}-${idx}" class="inline-translation">
                                        <strong style="color:#0056b3;">الترجمة الطبية:</strong><br>${transFormatted}
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div>`; // إغلاق editable-block
                    });
                    html += `</div></div>`; // إغلاق wrapper والصفحة
                });

                container.innerHTML = html;
                updateControls();
                fetchAllWordsTranslation();

            } catch(err) {
                console.error(err);
            }
        }

        // ================= دوال محرر التعديل (Editor Functions) =================
        
        function toggleEditorMode() {
            isEditing = !isEditing;
            document.body.classList.toggle('editing-active', isEditing);
            const btn = document.getElementById('editModeBtn');
            if(isEditing) {
                btn.innerHTML = "✅ إنهاء التعديل";
                btn.style.background = "#dc3545";
            } else {
                btn.innerHTML = "🛠️ تفعيل التعديل";
                btn.style.background = "#ff9800";
            }
        }

        function moveElement(blockId, direction) {
            const block = document.getElementById(blockId);
            const parent = block.parentNode;
            if (direction === -1 && block.previousElementSibling) {
                parent.insertBefore(block, block.previousElementSibling);
            } else if (direction === 1 && block.nextElementSibling) {
                parent.insertBefore(block.nextElementSibling, block);
            }
        }

        function resizeImage(blockId, percentChange) {
            const img = document.getElementById(blockId).querySelector('img');
            if (img) {
                // الحصول على العرض الحالي بالنسبة المئوية
                let currentWidth = parseInt(img.style.width) || 100;
                let newWidth = currentWidth + percentChange;
                if (newWidth > 10 && newWidth <= 100) {
                    img.style.width = newWidth + '%';
                }
            }
        }

        function alignElement(blockId, alignment) {
            const container = document.getElementById(blockId).querySelector('.lecture-image-container');
            if (container) {
                container.style.textAlign = alignment;
            }
        }

        function resizeText(blockId, remChange) {
            // تكبير/تصغير كل الأسطر داخل الفقرة
            const divs = document.getElementById(blockId).querySelectorAll('.english-paragraph div, .title-text div, .sub-title div');
            divs.forEach(div => {
                let currentSize = parseFloat(div.style.fontSize) || 1.25;
                let newSize = currentSize + (remChange * 0.1); // التغيير ببطء
                if(newSize > 0.5 && newSize < 3.0) {
                    div.style.fontSize = newSize + 'rem';
                }
            });
        }

        // ================= نظام الكبس والطباعة الذكي =================
        function printLecture() {
            if(isEditing) toggleEditorMode(); // إغلاق وضع التعديل قبل الطباعة
            
            const slides = document.querySelectorAll('.slide-page');
            slides.forEach(slide => {
                slide.style.display = 'block'; 
                slide.classList.add('active'); 
                
                const wrapper = slide.querySelector('.slide-content-wrapper');
                if (wrapper) {
                    wrapper.style.transform = 'scale(1)'; 
                    let scrollH = wrapper.scrollHeight;
                    let targetH = 1050; // حجم ورقة A4
                    
                    if (scrollH > targetH) {
                        let scaleValue = targetH / scrollH;
                        wrapper.style.transform = `scale(${scaleValue})`;
                    }
                }
            });

            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    slides.forEach((slide) => {
                        slide.style.display = '';
                        const wrapper = slide.querySelector('.slide-content-wrapper');
                        if(wrapper) wrapper.style.transform = 'scale(1)';
                    });
                    renderPage();
                }, 1000);
            }, 500);
        }

        // ================= دالة الترجمة الإجبارية =================
        async function fetchAllWordsTranslation() {
            const spans = document.querySelectorAll('.interactive-word');
            let missingWords = new Set();
            
            spans.forEach(span => {
                let clean = span.getAttribute('data-clean');
                if (clean && !span.getAttribute('data-trans')) {
                    missingWords.add(clean);
                }
            });

            let wordsArray = Array.from(missingWords);
            if (wordsArray.length === 0) return;

            const printBtn = document.getElementById('mainPrintBtn');
            printBtn.innerHTML = "⏳ جاري استخراج الكلمات...";
            printBtn.style.background = "#17a2b8";

            let chunkSize = 40;
            for (let i = 0; i < wordsArray.length; i += chunkSize) {
                let chunk = wordsArray.slice(i, i + chunkSize);
                let query = chunk.join('\n');
                try {
                    let res = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=' + encodeURIComponent(query));
                    let data = await res.json();
                    
                    let translatedLines = [];
                    data[0].forEach(item => {
                        if (item[0]) {
                            translatedLines.push(item[0].trim());
                        }
                    });

                    chunk.forEach((word, idx) => {
                        let trans = translatedLines[idx] || word;
                        dictionary[word] = trans;
                        document.querySelectorAll(`span[data-clean="${word}"]`).forEach(el => {
                            el.setAttribute('data-trans', trans);
                        });
                    });
                } catch(e) { console.error(e); }
            }
            
            printBtn.innerHTML = "🖨️ حفظ كـ PDF";
            printBtn.style.background = "#28a745";
        }

        function updateControls() {
            document.getElementById('pageIndicator').innerText = (currentIndex + 1) + " / " + pages.length;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;
        }

        function changePage(dir) {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex += dir;
            document.getElementById(`page-${currentIndex}`).classList.add('active');
            updateControls();
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        renderPage();

    </script>
</body>
