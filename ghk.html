<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة GHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --accent-color: #0056b3;
            --trans-bg: #f8f9fa;
            --trans-border: #0056b3;
            --nav-bg: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 90px; min-height: 100vh; }
        
        .content-container { padding: 20px 20px; max-width: 800px; margin: 0 auto; direction: ltr; }
        .text-block { margin-bottom: 25px; border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .title-text { font-weight: bold; font-size: 1.6rem; color: #000; margin-bottom: 15px; display: block; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; direction: ltr; }
        .sub-title { font-weight: bold; font-size: 1.4rem; color: var(--accent-color); margin-top: 20px; margin-bottom: 10px; display: block; direction: ltr; }
        
        .english-paragraph { line-height: 2.2; font-size: 1.25rem; color: #333; margin-bottom: 8px; text-align: left; }
        
        .interactive-word { cursor: pointer; border-bottom: 1px dotted #999; transition: background 0.2s; position: relative; display: inline-block;}
        .interactive-word:hover { background-color: #e3f2fd; color: var(--accent-color); }
        
        .toggle-trans-btn { background: none; border: none; color: #666; font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 0; direction: rtl; width: 100%; }
        .toggle-trans-btn:hover { color: var(--accent-color); }
        
        .inline-translation { display: none; background-color: var(--trans-bg); color: #000; padding: 12px; border-radius: 8px; margin-top: 5px; border-right: 4px solid var(--trans-border); font-family: 'Cairo', sans-serif; font-size: 1.15rem; line-height: 1.6; direction: rtl; text-align: justify; }

        .lecture-image-container { width: 100%; margin: 20px 0; text-align: center; }
        .lecture-image { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }

        .print-btn-float { position: fixed; top: 15px; right: 15px; background: #28a745; color: white; border: none; padding: 10px 18px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1rem; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .print-btn-float:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: var(--nav-bg); border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; direction: rtl; }
        .nav-btn { background: var(--accent-color); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background-color: #e0e0e0; color: #999; }
        .page-counter { font-family: 'Cairo', sans-serif; font-weight: bold; color: #555; background: #e9ecef; padding: 5px 15px; border-radius: 15px; }

        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; visibility: hidden; display: flex; align-items: flex-end; transition: all 0.3s;}
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-content { background: white; width: 100%; padding: 25px; border-top-left-radius: 25px; border-top-right-radius: 25px; text-align: center; transform: translateY(100%); transition: transform 0.3s;}
        .sheet-overlay.active .sheet-content { transform: translateY(0); }
        .selected-word-box { background-color: #e3f2fd; border: 1px solid #bbdefb; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .sw-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .audio-btn { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .sw-english { font-family: 'Roboto', sans-serif; font-weight: bold; font-size: 1.4rem; color: var(--accent-color); }
        .sw-arabic { font-family: 'Cairo', sans-serif; font-size: 1.3rem; color: #333; font-weight: bold; display: block; }

        /* بالموقع، يتم إخفاء السلايدات غير النشطة لترتيب القراءة */
        .slide-page { display: none; }
        .slide-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        /* ================= إعدادات الطباعة السحرية (لمنع ظهور صفحة واحدة فقط) ================= */
        @media print {
            body { font-size: 11pt !important; background: white; color: black; }
            .bottom-nav, .sheet-overlay, .toggle-trans-btn, .print-btn-float { display: none !important; }
            
            /* إجبار المتصفح على كشف جميع السلايدات وطباعتها بملف متصل */
            .slide-page { 
                display: block !important; 
                opacity: 1 !important; 
                visibility: visible !important; 
                position: static !important; 
                page-break-after: auto !important; /* لا تقطع الصفحة بعد كل سلايد */
                page-break-inside: auto !important; 
                padding: 0 !important; 
                margin: 0 0 20px 0 !important; 
                border-bottom: 2px dashed #000;
            }
            
            #contentArea, .content-container, body, html {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            
            /* منع قص الفقرات والصور وتصغير الحجم */
            .text-block { page-break-inside: avoid; margin-bottom: 15px !important; padding-bottom: 10px !important;}
            .lecture-image-container { page-break-inside: avoid; margin: 15px 0 !important; text-align: center;}
            .lecture-image { max-height: 250px !important; max-width: 100% !important; object-fit: contain; }
            
            /* مسافات للكلمات في الطباعة */
            .english-paragraph { font-size: 13pt !important; line-height: 3.2 !important; margin-bottom: 10px !important;}
            .title-text { font-size: 15pt !important; margin-bottom: 5px !important; line-height: 3.2 !important;}
            
            /* إظهار الترجمة الكاملة إجبارياً */
            .inline-translation { display: block !important; font-size: 11pt !important; line-height: 1.5 !important; border-top: 1px dashed #bbb; margin-top: 10px !important; padding-top: 5px !important; color: #444; direction: rtl;}
            
            /* الطاقية فوق الكلمات (تظهر لكل كلمة) */
            .interactive-word { border: none !important; position: relative; display: inline-block; margin-top: 25px;}
            .interactive-word[data-trans]::after {
                content: attr(data-trans);
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                font-size: 8.5pt !important;
                color: #cc0000 !important;
                font-family: 'Cairo', sans-serif;
                white-space: nowrap;
                font-weight: bold;
                direction: rtl;
            }
        }
    </style>
</head>
<body>

    <button class="print-btn-float" onclick="window.print()">
        🖨️ حفظ كـ PDF
    </button>

    <div class="content-container" id="contentArea"></div>

    <div class="bottom-nav">
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">التالي &#8592;</button>
        <div class="page-counter" id="pageIndicator">1</div>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8594; السابق</button>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
        <div class="sheet-content">
            <div style="font-family:'Cairo'; color:#666; margin-bottom:10px;">معنى الكلمة:</div>
            <div id="selectedWordBox" class="selected-word-box">
                <div class="sw-container">
                    <span id="swEnglish" class="sw-english"></span>
                    <button id="audioBtn" class="audio-btn" onclick="playAudio()">🔊</button>
                </div>
                <span id="swArabic" class="sw-arabic"></span>
            </div>
        </div>
    </div>

    <script>
        // قاموس احتياطي للحروف الشائعة جداً لضمان السرعة
        const fallbackDict = {
            "the":"الـ", "of":"من", "in":"في", "and":"و", "is":"هو", "are":"هم", "to":"إلى", "a":"أداة", "an":"أداة", "with":"مع", "without":"بدون",
            "on":"على", "at":"عند", "by":"بواسطة", "for":"لـ", "from":"من", "or":"أو", "we":"نحن", "have":"نملك", "be":"يكون", "not":"لا"
        };

        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding", "trans": "1.16 Signal Coding\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "To explain this subject clearly and easy assimilation, suppose some of the", "trans": "To explain this subject clearly and easy assimilation, suppose some of the\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "assumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,", "trans": "assumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "we work with a homogeneous magnetic field, which covers the whole body from", "trans": "we work with a homogeneous magnetic field, which covers the whole body from\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "head to toe. (This is quite different in reality, where there is only a homogenous", "trans": "head to toe. (This is quite different in reality, where there is only a homogenous\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "sphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,", "trans": "sphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "but this assumption easy to the explanation and the idea explained). Just as important", "trans": "but this assumption easy to the explanation and the idea explained). Just as important\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "as the strength of the main magnet is its precision. The straightness of the magnetic", "trans": "as the strength of the main magnet is its precision. The straightness of the magnetic\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "lines within the center (or, as it is technically known, the iso-center) of the magnet", "trans": "lines within the center (or, as it is technically known, the iso-center) of the magnet\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "needs to be near-perfect. This is known as homogeneity. Fluctuations", "trans": "needs to be near-perfect. This is known as homogeneity. Fluctuations\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(inhomogeneities in the field strength) within the scan region should be less than", "trans": "(inhomogeneities in the field strength) within the scan region should be less than\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "three parts per million (3 ppm). When we put a patient in the magnet, all the protons,", "trans": "three parts per million (3 ppm). When we put a patient in the magnet, all the protons,\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "from head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz", "trans": "from head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(Figure 28).", "trans": "(Figure 28).\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": true}, {"type": "image", "src": "images/img_314eb2b0.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "all the protons would react and return a signal. We would have no clue where the\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "signal comes from: from head or toe.\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}]}, {"content": [{"type": "text", "text": "This will generate an additional magnetic field in the Z-direction, which is", "trans": "This will generate an additional magnetic field in the Z-direction, which is\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "superimposed on Bo. The indication +Gz in Figure 29 means there is a slightly", "trans": "superimposed on Bo. The indication +Gz in Figure 29 means there is a slightly\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "stronger Bo field in the head as there is in the iso-center of the magnet. A stronger", "trans": "stronger Bo field in the head as there is in the iso-center of the magnet. A stronger\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "Bo field means a higher Larmor frequency. Along the entire the slope of the gradient", "trans": "Bo field means a higher Larmor frequency. Along the entire the slope of the gradient\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "there is a different Bo field and consequently the protons spin at slightly different", "trans": "there is a different Bo field and consequently the protons spin at slightly different\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies. Therefore, the protons in the head will spin slightly faster than the ones", "trans": "frequencies. Therefore, the protons in the head will spin slightly faster than the ones\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "in the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that", "trans": "in the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "the protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet", "trans": "the protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "still at 63.6 MHz and the ones in the head with 63.7 MHz", "trans": "still at 63.6 MHz and the ones in the head with 63.7 MHz\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "This means we can \"pick out\" the section which we want to excite by choosing the", "trans": "This means we can \"pick out\" the section which we want to excite by choosing the\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "right frequency range of RF excitation pulse. The section which contains Larmor", "trans": "right frequency range of RF excitation pulse. The section which contains Larmor\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies which match the frequencies of the oscillating magnetic field will", "trans": "frequencies which match the frequencies of the oscillating magnetic field will\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "respond. An MRI signal will be generated only from that section of the patient. This", "trans": "respond. An MRI signal will be generated only from that section of the patient. This\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "is called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is", "trans": "is called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "applied in the z-axis-the head-foot direction in the scanner. But because a gradient", "trans": "applied in the z-axis-the head-foot direction in the scanner. But because a gradient\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "image", "src": "images/img_65ac070c.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "all the protons would react and return a signal. We would have no clue where the\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "signal comes from: from head or toe.\n(⚠️ فشلت المعالجة التلقائية)", "words": {}, "isTitle": false, "isSubTitle": false}]}];
        let currentIndex = 0;

        function renderPage() {
            try {
                const container = document.getElementById('contentArea');
                let html = '';
                
                pages.forEach((pageData, pageIndex) => {
                    let activeClass = pageIndex === currentIndex ? 'active' : '';
                    html += `<div class="slide-page ${activeClass}" id="page-${pageIndex}">`;
                    
                    pageData.content.forEach((item, idx) => {
                        if (item.type === 'image') {
                            html += `<div class="lecture-image-container"><img src="${item.src}" class="lecture-image"></div>`;
                        } else {
                            let cssClass = "english-paragraph";
                            if (item.isTitle) cssClass = "title-text";
                            if (item.isSubTitle) cssClass = "sub-title";

                            let formattedBlock = '';
                            let actualLines = item.text.split('\n');
                            
                            // استدعاء قاموس جمناي المدمج الخاص بهذه الفقرة تحديداً
                            let localDict = item.words || {};
                            
                            actualLines.forEach(line => {
                                let interactiveText = '';
                                let words = line.split(' ');
                                words.forEach(word => {
                                    let clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                                    if (clean && /[a-z]/i.test(clean)) {
                                        // سحب الترجمة، وإذا ماكو ياخذها من الاحتياطي
                                        let trans = localDict[clean] || fallbackDict[clean] || "";
                                        // حماية كود الـ HTML من علامات الاقتباس اللي تكسر الصفحة
                                        trans = trans.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                                        let safeWord = word.replace(/'/g, "\'").replace(/"/g, "&quot;");
                                        
                                        let transAttr = trans ? `data-trans="${trans}"` : '';
                                        
                                        interactiveText += `<span class="interactive-word" data-clean="${clean}" ${transAttr} onclick="showWordMeaning('${clean}', '${safeWord}', this)">${word}</span> `;
                                    } else {
                                        interactiveText += `${word} `; 
                                    }
                                });
                                formattedBlock += `<div>${interactiveText}</div>`;
                            });

                            let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                            html += `
                                <div class="text-block">
                                    <div class="${cssClass}">
                                        ${formattedBlock}
                                    </div>
                                    <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${pageIndex}-${idx}')">
                                        إظهار الترجمة &#11015;
                                    </button>
                                    <div id="trans-${pageIndex}-${idx}" class="inline-translation">
                                        <strong style="color:#0056b3;">الترجمة الطبية:</strong><br>${transFormatted}
                                    </div>
                                </div>
                            `;
                        }
                    });
                    html += `</div>`;
                });

                container.innerHTML = html;
                updateControls();
            } catch(err) {
                console.error(err);
            }
        }

        function updateControls() {
            document.getElementById('pageIndicator').innerText = (currentIndex + 1) + " / " + pages.length;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;
        }

        function changePage(dir) {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex += dir;
            document.getElementById(`page-${currentIndex}`).classList.add('active');
            updateControls();
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        let currentWordForAudio = "";

        async function showWordMeaning(cleanWord, originalWord, element) {
            currentWordForAudio = originalWord.replace(/[^a-zA-Z]/g, '');
            const enSpan = document.getElementById('swEnglish');
            const arSpan = document.getElementById('swArabic');
            
            enSpan.innerText = currentWordForAudio;
            const overlay = document.getElementById('sheetOverlay');
            overlay.classList.add('active');

            if (element && element.getAttribute('data-trans')) {
                arSpan.innerText = element.getAttribute('data-trans');
            } else {
                arSpan.innerText = fallbackDict[cleanWord] || "غير متوفرة";
            }
        }

        function playAudio() {
            if (currentWordForAudio) {
                const utterance = new SpeechSynthesisUtterance(currentWordForAudio);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function closeSheet(e) {
            if (e.target.id === 'sheetOverlay') {
                const overlay = document.getElementById('sheetOverlay');
                overlay.classList.remove('active');
            }
        }

        renderPage();

    </script>
</body>
</html>
