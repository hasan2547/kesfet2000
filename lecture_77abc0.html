<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة تفاعلية ذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #202124; --accent-color: #0056b3;
            --trans-bg: #f1f3f4; --trans-border: #1a73e8; --nav-bg: #f8f9fa;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 90px; min-height: 100vh; }
        .content-container { padding: 20px; max-width: 800px; margin: 0 auto; direction: ltr; }
        .text-block { margin-bottom: 25px; border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .title-text { font-weight: bold; font-size: 1.5rem; color: #1a73e8; margin-bottom: 15px; display: block; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; direction: ltr; text-align: left; }
        .english-paragraph { line-height: 1.8; font-size: 1.2rem; color: #333; margin-bottom: 8px; text-align: left; }
        .interactive-word { cursor: pointer; border-bottom: 2px dotted #1a73e8; transition: all 0.2s; padding: 0 2px; }
        .interactive-word:hover { background-color: #e8f0fe; color: #1a73e8; border-radius: 4px; }
        .toggle-trans-btn { background: none; border: none; color: #5f6368; font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 8px 0; direction: rtl; width: 100%; }
        .inline-translation { display: none; background-color: var(--trans-bg); color: #202124; padding: 14px; border-radius: 8px; margin-top: 8px; border-right: 5px solid var(--trans-border); font-family: 'Cairo', sans-serif; font-size: 1.15rem; line-height: 1.6; direction: rtl; text-align: justify; }
        .highlight-important { color: #b31412; font-weight: 700; background-color: #feeeee; padding: 2px 6px; border-radius: 4px; border: 1px dashed #fdadad; }
        .lecture-image-container { width: 100%; margin: 20px 0; text-align: center; }
        .lecture-image { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); border: 1px solid #dadce0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: var(--nav-bg); border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; direction: rtl; }
        .nav-btn { background: var(--accent-color); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .nav-btn:disabled { background-color: #e0e0e0; color: #999; cursor: not-allowed; }
        .page-counter { font-family: 'Cairo', sans-serif; font-weight: bold; color: #555; background: #e9ecef; padding: 5px 15px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="content-container" id="contentArea"></div>
    <div class="bottom-nav">
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">التالي &#8592;</button>
        <div class="page-counter" id="pageIndicator">1</div>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8594; السابق</button>
    </div>

    <script>
        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding  \nTo explain this subject clearly and easy assimilation, suppose some of the  \nassumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,  \nwe work with a homogeneous magnetic field, which covers the whole body from  \nhead to toe. (This is quite different in reality, where there is only a homogenous  \nsphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,  \nbut this assumption easy to the explanation and the idea explained). Just as important  \nas the strength of the main magnet is its precision. The straightness of the magnetic  \nlines within the center (or, as it is technically known, the iso-center) of the magnet  \nneeds to be near-perfect. This is known as homogeneity. Fluctuations  \n(inhomogeneities in the field strength) within the scan region should be less than  \nthree parts per million (3 ppm). When we put a patient in the magnet, all the protons,  \nfrom head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz  \n(Figure 28).", "trans": "<span style='color:red;'>⚠️ ذكاء جمناي لم يتمكن من ترجمة هذا الجزء تلقائياً. النص الأصلي:</span><br>1.16 Signal Coding  \nTo explain this subject clearly and easy assimilation, suppose some of the  \nassumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,  \nwe work with a homogeneous magnetic field, which covers the whole body from  \nhead to toe. (This is quite different in reality, where there is only a homogenous  \nsphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,  \nbut this assumption easy to the explanation and the idea explained). Just as important  \nas the strength of the main magnet is its precision. The straightness of the magnetic  \nlines within the center (or, as it is technically known, the iso-center) of the magnet  \nneeds to be near-perfect. This is known as homogeneity. Fluctuations  \n(inhomogeneities in the field strength) within the scan region should be less than  \nthree parts per million (3 ppm). When we put a patient in the magnet, all the protons,  \nfrom head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz  \n(Figure 28).", "isTitle": true}, {"type": "image", "src": "images/img_ece73c50.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then  \nall the protons would react and return a signal. We would have no clue where the  \nsignal comes from: from head or toe.", "trans": "<span style='color:red;'>⚠️ ذكاء جمناي لم يتمكن من ترجمة هذا الجزء تلقائياً. النص الأصلي:</span><br>If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then  \nall the protons would react and return a signal. We would have no clue where the  \nsignal comes from: from head or toe.", "isTitle": false}]}, {"content": [{"type": "text", "text": "1.16.1 Slice Encoding Gradient  \nThe magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is  \nswitched on) at the same time as the RF pulse (see figure 29).", "trans": "<span style='color:red;'>⚠️ ذكاء جمناي لم يتمكن من ترجمة هذا الجزء تلقائياً. النص الأصلي:</span><br>1.16.1 Slice Encoding Gradient  \nThe magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is  \nswitched on) at the same time as the RF pulse (see figure 29).", "isTitle": true}, {"type": "image", "src": "images/img_bf153fc2.jpg"}, {"type": "text", "text": "This will generate an additional magnetic field in the Z-direction, which is  \nsuperimposed on Bo. The indication +Gz in Figure 29 means there is a slightly  \nstronger Bo field in the head as there is in the iso-center of the magnet. A stronger  \nBo field means a higher Larmor frequency. Along the entire the slope of the gradient  \nthere is a different Bo field and consequently the protons spin at slightly different  \nfrequencies. Therefore, the protons in the head will spin slightly faster than the ones  \nin the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that  \nthe protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet  \nstill at 63.6 MHz and the ones in the head with 63.7 MHz  \nThis means we can \"pick out\" the section which we want to excite by choosing the  \nright frequency range of RF excitation pulse. The section which contains Larmor \nfrequencies which match the frequencies of the oscillating magnetic field will  \nrespond. An MRI signal will be generated only from that section of the patient. This  \nis called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is  \napplied in the z-axis-the head-foot direction in the scanner. But because a gradient", "trans": "<span style='color:red;'>⚠️ ذكاء جمناي لم يتمكن من ترجمة هذا الجزء تلقائياً. النص الأصلي:</span><br>This will generate an additional magnetic field in the Z-direction, which is  \nsuperimposed on Bo. The indication +Gz in Figure 29 means there is a slightly  \nstronger Bo field in the head as there is in the iso-center of the magnet. A stronger  \nBo field means a higher Larmor frequency. Along the entire the slope of the gradient  \nthere is a different Bo field and consequently the protons spin at slightly different  \nfrequencies. Therefore, the protons in the head will spin slightly faster than the ones  \nin the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that  \nthe protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet  \nstill at 63.6 MHz and the ones in the head with 63.7 MHz  \nThis means we can \"pick out\" the section which we want to excite by choosing the  \nright frequency range of RF excitation pulse. The section which contains Larmor \nfrequencies which match the frequencies of the oscillating magnetic field will  \nrespond. An MRI signal will be generated only from that section of the patient. This  \nis called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is  \napplied in the z-axis-the head-foot direction in the scanner. But because a gradient", "isTitle": false}]}];
        let currentIndex = 0;

        function showWordMeaning(word) {
            if(word && word.trim() !== "") {
                alert("الكلمة المحددة: " + word + "\n(المكان مجهز لربط قاموسك الخاص لاحقاً)");
            }
        }

        function renderPage() {
            const container = document.getElementById('contentArea');
            const data = pages[currentIndex];
            
            document.getElementById('pageIndicator').innerText = `${currentIndex + 1} / ${pages.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;

            let html = '';
            data.content.forEach((item, idx) => {
                if (item.type === 'image') {
                    html += `<div class="lecture-image-container"><img src="${item.src}" class="lecture-image"></div>`;
                } else {
                    let cssClass = item.isTitle ? "title-text" : "english-paragraph";
                    const lines = item.text.split('\n');
                    let formattedBlock = '';
                    
                    lines.forEach(line => {
                        const words = line.split(' ');
                        let interactiveText = '';
                        words.forEach(word => {
                            const cleanWordForLookup = word.replace(/[.,()?!:;“”"°\[\]*\-0-9]/g, '').trim();
                            if (cleanWordForLookup && /[a-z]/i.test(cleanWordForLookup)) {
                                interactiveText += `<span class="interactive-word" onclick="showWordMeaning('${cleanWordForLookup}')">${word}</span> `;
                            } else {
                                interactiveText += `${word} `; 
                            }
                        });
                        formattedBlock += `<div>${interactiveText}</div>`;
                    });

                    let transFormatted = item.trans.replace(/\n/g, '<br>');

                    html += `
                        <div class="text-block">
                            <div class="${cssClass}">${formattedBlock}</div>
                            <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${idx}')">💡 إظهار الترجمة الطبية الكاملة للسلايد ⬇️</button>
                            <div id="trans-${idx}" class="inline-translation">${transFormatted}</div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === "block" ? "none" : "block";
        }

        function changePage(dir) {
            currentIndex += dir;
            renderPage();
        }

        renderPage();
    </script>
</body>
</html>
