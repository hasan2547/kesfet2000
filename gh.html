<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة GH</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --accent-color: #0056b3;
            --trans-bg: #f8f9fa;
            --trans-border: #0056b3;
            --nav-bg: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 90px; min-height: 100vh; }
        
        .content-container { padding: 20px 20px; max-width: 800px; margin: 0 auto; direction: ltr; }
        .text-block { margin-bottom: 25px; border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .title-text { font-weight: bold; font-size: 1.6rem; color: #000; margin-bottom: 15px; display: block; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; direction: ltr; }
        .sub-title { font-weight: bold; font-size: 1.4rem; color: var(--accent-color); margin-top: 20px; margin-bottom: 10px; display: block; direction: ltr; }
        
        .english-paragraph { line-height: 2.2; font-size: 1.25rem; color: #333; margin-bottom: 8px; text-align: left; }
        
        .interactive-word { cursor: pointer; border-bottom: 1px dotted #999; transition: background 0.2s; position: relative; display: inline-block;}
        .interactive-word:hover { background-color: #e3f2fd; color: var(--accent-color); }
        
        .toggle-trans-btn { background: none; border: none; color: #666; font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 0; direction: rtl; width: 100%; }
        .toggle-trans-btn:hover { color: var(--accent-color); }
        
        .inline-translation { display: none; background-color: var(--trans-bg); color: #000; padding: 12px; border-radius: 8px; margin-top: 5px; border-right: 4px solid var(--trans-border); font-family: 'Cairo', sans-serif; font-size: 1.15rem; line-height: 1.6; direction: rtl; text-align: justify; }

        .lecture-image-container { width: 100%; margin: 20px 0; text-align: center; }
        .lecture-image { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }

        /* زر الطباعة العائم */
        .print-btn-float { position: fixed; top: 15px; right: 15px; background: #28a745; color: white; border: none; padding: 10px 18px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1rem; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .print-btn-float:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: var(--nav-bg); border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; direction: rtl; }
        .nav-btn { background: var(--accent-color); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background-color: #e0e0e0; color: #999; }
        .page-counter { font-family: 'Cairo', sans-serif; font-weight: bold; color: #555; background: #e9ecef; padding: 5px 15px; border-radius: 15px; }

        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; visibility: hidden; display: flex; align-items: flex-end; transition: all 0.3s;}
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-content { background: white; width: 100%; padding: 25px; border-top-left-radius: 25px; border-top-right-radius: 25px; text-align: center; transform: translateY(100%); transition: transform 0.3s;}
        .sheet-overlay.active .sheet-content { transform: translateY(0); }
        .selected-word-box { background-color: #e3f2fd; border: 1px solid #bbdefb; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .sw-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .audio-btn { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .sw-english { font-family: 'Roboto', sans-serif; font-weight: bold; font-size: 1.4rem; color: var(--accent-color); }
        .sw-arabic { font-family: 'Cairo', sans-serif; font-size: 1.3rem; color: #333; font-weight: bold; display: block; }

        /* الشاشات (تظهر سلايد واحد) */
        .slide-page { display: none; }
        .slide-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        /* ================= إعدادات الطباعة السحرية ================= */
        .print-cover { display: none; }

        @media print {
            body { background: white; padding: 0; margin: 0; color: black; }
            .bottom-nav, .sheet-overlay, .toggle-trans-btn, .print-btn-float { display: none !important; }
            
            /* إظهار الغلاف في الطباعة */
            .print-cover { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; page-break-after: always; text-align: center; background: #f8f9fa; border: 2px solid #ddd; border-radius: 10px; margin: 20px;}
            .print-cover h1 { font-size: 3rem; color: #0056b3; margin-bottom: 10px; text-transform: uppercase;}
            .print-cover h2 { font-size: 2rem; color: #333; font-family: 'Cairo'; }
            
            .content-container { max-width: 100%; padding: 0; margin: 0; }
            
            /* إظهار كل السلايدات في الـ PDF */
            .slide-page { display: block !important; page-break-after: always; padding: 30px; box-sizing: border-box; }
            
            /* منع قص الفقرات والصور */
            .text-block { page-break-inside: avoid; border-bottom: 1px solid #ccc; margin-bottom: 20px; padding-bottom: 10px;}
            .lecture-image-container { page-break-inside: avoid; margin: 20px 0; }
            .lecture-image { max-height: 400px; width: auto; object-fit: contain; box-shadow: none; border: 2px solid #333; }
            
            /* إظهار الترجمة الكاملة إجبارياً */
            .inline-translation { display: block !important; border: none; border-top: 1px dashed #999; margin-top: 15px; padding-top: 10px; background: transparent; color: #444; }
            
            /* الكلمات المترجمة فوق الكلمة الإنجليزية (الطاقية) */
            .english-paragraph, .title-text, .sub-title { line-height: 2.8 !important; }
            .interactive-word { border: none; position: relative; display: inline-block; margin-top: 15px;}
            .interactive-word[data-trans]::after {
                content: attr(data-trans);
                position: absolute;
                top: -1.5em;
                left: 50%;
                transform: translateX(-50%);
                font-size: 0.6em;
                color: #0056b3;
                font-family: 'Cairo', sans-serif;
                white-space: nowrap;
                font-weight: bold;
                direction: rtl;
            }
        }
    </style>
</head>
<body>

    <button class="print-btn-float" onclick="window.print()">
        🖨️ حفظ كـ PDF
    </button>

    <div class="content-container" id="contentArea"></div>

    <div class="bottom-nav">
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">التالي &#8592;</button>
        <div class="page-counter" id="pageIndicator">1</div>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8594; السابق</button>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
        <div class="sheet-content">
            <div style="font-family:'Cairo'; color:#666; margin-bottom:10px;">معنى الكلمة:</div>
            <div id="selectedWordBox" class="selected-word-box">
                <div class="sw-container">
                    <span id="swEnglish" class="sw-english"></span>
                    <button id="audioBtn" class="audio-btn" onclick="playAudio()">🔊</button>
                </div>
                <span id="swArabic" class="sw-arabic"></span>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            "the": "الـ", "of": "من/لـ", "in": "في", "and": "و", "is": "هو/يكون", "are": "هم/يكونون",
            "to": "إلى/لـ", "a": "أداة تنكير", "an": "أداة تنكير", "with": "مع", "without": "بدون",
            "head": "رأس", "neck": "عنق", "chest": "صدر", "abdomen": "بطن", "back": "ظهر",
            "arm": "ذراع", "leg": "ساق", "bone": "عظم", "muscle": "عضلة", "brain": "دماغ",
            "skull": "جمجمة", "blood": "دم", "vein": "وريد", "artery": "شريان", "heart": "قلب",
            "lung": "رئة", "liver": "كبد", "kidney": "كلية", "stomach": "معدة", "pelvis": "حوض",
            "spine": "عمود فقري", "joint": "مفصل", "patient": "مريض", "position": "وضعية",
            "clinical": "سريري", "indications": "دواعي الاستعمال", "radiograph": "صورة شعاعية",
            "x-ray": "أشعة سينية", "mri": "رنين مغناطيسي", "ct": "مفراس"
        };

        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding", "trans": "1.16 ترميز الإشارة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "To explain this subject clearly and easy assimilation, suppose some of the", "trans": "ولشرح هذا الموضوع بشكل واضح وسهل الاستيعاب، افترض بعضا من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "assumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,", "trans": "الافتراضات: النظر في صورة محورية للدماغ باستخدام مغناطيس 1.5 تسلا. أيضًا،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "we work with a homogeneous magnetic field, which covers the whole body from", "trans": "نحن نعمل بمجال مغناطيسي متجانس يغطي الجسم كله منه", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "head to toe. (This is quite different in reality, where there is only a homogenous", "trans": "الرأس إلى أخمص القدمين. (وهذا يختلف تماما في الواقع، حيث لا يوجد سوى متجانس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "sphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,", "trans": "كرة قطرها 40 سم في المركز المتساوي (مركز تجويف التصوير بالرنين المغناطيسي) للمغناطيس،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "but this assumption easy to the explanation and the idea explained). Just as important", "trans": "ولكن هذا الافتراض سهل الشرح وشرح الفكرة). بنفس القدر من الأهمية", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "as the strength of the main magnet is its precision. The straightness of the magnetic", "trans": "لأن قوة المغناطيس الرئيسي هي دقته. استقامة المغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "lines within the center (or, as it is technically known, the iso-center) of the magnet", "trans": "خطوط داخل المركز (أو، كما هو معروف تقنيًا، مركز الأيزو) للمغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "needs to be near-perfect. This is known as homogeneity. Fluctuations", "trans": "يجب أن تكون شبه مثالية. وهذا ما يعرف بالتجانس. التقلبات", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(inhomogeneities in the field strength) within the scan region should be less than", "trans": "(عدم التجانس في شدة المجال) داخل منطقة المسح يجب أن يكون أقل من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "three parts per million (3 ppm). When we put a patient in the magnet, all the protons,", "trans": "ثلاثة أجزاء في المليون (3 جزء في المليون). عندما نضع مريضًا في المغناطيس، جميع البروتونات،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "from head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz", "trans": "من الرأس إلى أخمص القدمين، محاذاة مع B0. أنها تدور على تردد لارمور 63.6 ميغاهيرتز", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(Figure 28).", "trans": "(الشكل 28).", "isTitle": false, "isSubTitle": true}, {"type": "image", "src": "images/img_5a6e2f10.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "إذا استخدمنا نبضة RF مثيرة تبلغ 90 درجة لقلب المغنطة إلى المستوى xy، إذن", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "سوف تتفاعل جميع البروتونات وتعيد الإشارة. لن يكون لدينا أدنى فكرة عن مكان", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "تأتي الإشارة من: من الرأس أو أخمص القدمين.", "isTitle": false, "isSubTitle": false}]}, {"content": [{"type": "text", "text": "1.16.1 Slice Encoding Gradient", "trans": "1.16.1 تدرج ترميز الشريحة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "The magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is", "trans": "يتم تطبيق تدرج المجال المغناطيسي (على سبيل المثال، التدرج Z) مؤقتًا (التدرج Z هو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "switched on) at the same time as the RF pulse (see figure 29).", "trans": "قيد التشغيل) في نفس الوقت الذي يتم فيه نبض التردد اللاسلكي (انظر الشكل 29).", "isTitle": false, "isSubTitle": false}, {"type": "image", "src": "images/img_88003dfc.jpg"}, {"type": "text", "text": "This will generate an additional magnetic field in the Z-direction, which is", "trans": "سيؤدي هذا إلى توليد مجال مغناطيسي إضافي في الاتجاه Z، وهو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "superimposed on Bo. The indication +Gz in Figure 29 means there is a slightly", "trans": "فرضه على بو. الإشارة +Gz في الشكل 29 تعني وجود القليل", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "stronger Bo field in the head as there is in the iso-center of the magnet. A stronger", "trans": "مجال بو أقوى في الرأس كما يوجد في مركز الأيزو للمغناطيس. أقوى", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "Bo field means a higher Larmor frequency. Along the entire the slope of the gradient", "trans": "حقل Bo يعني تردد لارمور أعلى. على طول منحدر التدرج بأكمله", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "there is a different Bo field and consequently the protons spin at slightly different", "trans": "يوجد مجال Bo مختلف وبالتالي تدور البروتونات بشكل مختلف قليلاً", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies. Therefore, the protons in the head will spin slightly faster than the ones", "trans": "الترددات. ولذلك، فإن البروتونات الموجودة في الرأس سوف تدور بشكل أسرع قليلاً من تلك الموجودة في الرأس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "in the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that", "trans": "في مركز الأيزو. والعكس ينطبق على البروتونات الموجودة في القدمين. ويبين الشكل 28 ذلك", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "the protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet", "trans": "تدور البروتونات الموجودة في القدم الآن بسرعة 63.5 ميجاهرتز، وهي تلك الموجودة في المركز المتساوي للمغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "still at 63.6 MHz and the ones in the head with 63.7 MHz", "trans": "لا يزال عند 63.6 ميجا هرتز وتلك الموجودة في الرأس بتردد 63.7 ميجا هرتز", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "This means we can \"pick out\" the section which we want to excite by choosing the", "trans": "هذا يعني أنه يمكننا 'انتقاء' القسم الذي نريد إثارة اهتمامه عن طريق اختيار", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "right frequency range of RF excitation pulse. The section which contains Larmor", "trans": "نطاق التردد الصحيح لنبض الإثارة RF. القسم الذي يحتوي على Larmor", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "frequencies which match the frequencies of the oscillating magnetic field will", "trans": "الترددات التي تتوافق مع ترددات المجال المغناطيسي المتذبذب", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "respond. An MRI signal will be generated only from that section of the patient. This", "trans": "يرد. سيتم إنشاء إشارة التصوير بالرنين المغناطيسي فقط من هذا القسم من المريض. هذا", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "is called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is", "trans": "يسمى تشفير الشريحة أو اختيار الشريحة. عادةً ما يكون تدرج اختيار الشريحة هو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "applied in the z-axis-the head-foot direction in the scanner. But because a gradient", "trans": "يتم تطبيقه في المحور z-اتجاه الرأس والقدم في الماسح الضوئي. ولكن بسبب التدرج", "isTitle": false, "isSubTitle": false}]}];
        let currentIndex = 0;

        function renderPage() {
            try {
                const container = document.getElementById('contentArea');
                
                // إضافة الغلاف
                let html = `
                    <div class="print-cover">
                        <h2 style="color: #666; margin-bottom:0;">Radiology & Sonar Lecture</h2>
                        <h1 style="font-family:'Segoe UI', Arial, sans-serif;">GH</h1>
                        <h3 style="font-family:'Cairo'; color:#444;">ملزمة مترجمة وتفاعلية</h3>
                        <p style="font-family:'Cairo'; margin-top:50px; color:#888;">تم الإنشاء بواسطة الذكاء الاصطناعي</p>
                    </div>
                `;
                
                // بناء جميع السلايدات
                pages.forEach((pageData, pageIndex) => {
                    let activeClass = pageIndex === currentIndex ? 'active' : '';
                    html += `<div class="slide-page ${activeClass}" id="page-${pageIndex}">`;
                    
                    pageData.content.forEach((item, idx) => {
                        if (item.type === 'image') {
                            html += `<div class="lecture-image-container"><img src="${item.src}" class="lecture-image"></div>`;
                        } else {
                            let cssClass = "english-paragraph";
                            if (item.isTitle) cssClass = "title-text";
                            if (item.isSubTitle) cssClass = "sub-title";

                            let formattedBlock = '';
                            let actualLines = item.text.split('\n');
                            
                            actualLines.forEach(line => {
                                let interactiveText = '';
                                let words = line.split(' ');
                                words.forEach(word => {
                                    let clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                                    if (clean && /[a-z]/i.test(clean)) {
                                        let safeWord = word.replace(/'/g, "\'").replace(/"/g, "&quot;");
                                        let transAttr = dictionary[clean] ? `data-trans="${dictionary[clean]}"` : '';
                                        interactiveText += `<span class="interactive-word" data-clean="${clean}" ${transAttr} onclick="showWordMeaning('${clean}', '${safeWord}')">${word}</span> `;
                                    } else {
                                        interactiveText += `${word} `; 
                                    }
                                });
                                formattedBlock += `<div>${interactiveText}</div>`;
                            });

                            let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                            html += `
                                <div class="text-block">
                                    <div class="${cssClass}">
                                        ${formattedBlock}
                                    </div>
                                    <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${pageIndex}-${idx}')">
                                        إظهار الترجمة &#11015;
                                    </button>
                                    <div id="trans-${pageIndex}-${idx}" class="inline-translation">
                                        <strong style="color:#0056b3;">الترجمة الطبية:</strong><br>${transFormatted}
                                    </div>
                                </div>
                            `;
                        }
                    });
                    html += `</div>`;
                });

                container.innerHTML = html;
                updateControls();
            } catch(err) {
                document.getElementById('contentArea').innerHTML = "<h3 style='color:red; text-align:center;'>حدث خطأ في عرض المحاضرة</h3>";
                console.error(err);
            }
        }

        function updateControls() {
            document.getElementById('pageIndicator').innerText = (currentIndex + 1) + " / " + pages.length;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;
        }

        function changePage(dir) {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex += dir;
            document.getElementById(`page-${currentIndex}`).classList.add('active');
            updateControls();
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        let currentWordForAudio = "";

        async function showWordMeaning(cleanWord, originalWord) {
            currentWordForAudio = originalWord.replace(/[^a-zA-Z]/g, '');
            const enSpan = document.getElementById('swEnglish');
            const arSpan = document.getElementById('swArabic');
            
            enSpan.innerText = currentWordForAudio;
            const overlay = document.getElementById('sheetOverlay');
            overlay.classList.add('active');

            if (dictionary[cleanWord]) {
                arSpan.innerText = dictionary[cleanWord];
            } else {
                arSpan.innerText = "جاري الترجمة... ⏳";
                try {
                    let res = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=' + encodeURIComponent(cleanWord));
                    let data = await res.json();
                    if(data && data[0] && data[0][0] && data[0][0][0]) {
                        let translation = data[0][0][0];
                        arSpan.innerText = translation;
                        dictionary[cleanWord] = translation;
                        
                        // سحر: تحديث الكلمة حتى تظهر فوقها الترجمة في الطباعة فوراً
                        document.querySelectorAll(`span[data-clean="${cleanWord}"]`).forEach(el => {
                            el.setAttribute('data-trans', translation);
                        });
                        
                    } else {
                        arSpan.innerText = "---";
                    }
                } catch(e) {
                    arSpan.innerText = "خطأ بالاتصال بالنت";
                }
            }
        }

        function playAudio() {
            if (currentWordForAudio) {
                const utterance = new SpeechSynthesisUtterance(currentWordForAudio);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function closeSheet(e) {
            if (e.target.id === 'sheetOverlay') {
                const overlay = document.getElementById('sheetOverlay');
                overlay.classList.remove('active');
            }
        }

        renderPage();

    </script>
</body>
</html>
