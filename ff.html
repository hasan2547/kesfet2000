<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة FF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --accent-color: #0056b3;
            --trans-bg: #f8f9fa;
            --trans-border: #0056b3;
            --nav-bg: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 90px; min-height: 100vh; }
        
        .content-container { padding: 20px 20px; max-width: 800px; margin: 0 auto; direction: ltr; }
        .text-block { margin-bottom: 25px; border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .title-text { font-weight: bold; font-size: 1.6rem; color: #000; margin-bottom: 15px; display: block; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; direction: ltr; }
        .sub-title { font-weight: bold; font-size: 1.4rem; color: var(--accent-color); margin-top: 20px; margin-bottom: 10px; display: block; direction: ltr; }
        
        .english-paragraph { line-height: 2.2; font-size: 1.25rem; color: #333; margin-bottom: 8px; text-align: left; }
        
        .interactive-word { cursor: pointer; border-bottom: 1px dotted #999; transition: background 0.2s; }
        .interactive-word:hover { background-color: #e3f2fd; color: var(--accent-color); }
        
        .toggle-trans-btn { background: none; border: none; color: #666; font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 0; direction: rtl; width: 100%; }
        
        .inline-translation { display: none; background-color: var(--trans-bg); color: #000; padding: 12px; border-radius: 8px; margin-top: 5px; border-right: 4px solid var(--trans-border); font-family: 'Cairo', sans-serif; font-size: 1.15rem; line-height: 1.6; direction: rtl; text-align: justify; }

        .lecture-image-container { width: 100%; margin: 20px 0; text-align: center; }
        .lecture-image { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }

        /* زر الطباعة العائم */
        .print-btn-float { position: fixed; top: 15px; right: 15px; background: #28a745; color: white; border: none; padding: 10px 18px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1rem; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; display: flex; align-items: center; gap: 8px;}
        .print-btn-float:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: var(--nav-bg); border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; direction: rtl; }
        .nav-btn { background: var(--accent-color); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background-color: #e0e0e0; color: #999; }
        .page-counter { font-family: 'Cairo', sans-serif; font-weight: bold; color: #555; background: #e9ecef; padding: 5px 15px; border-radius: 15px; }

        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; visibility: hidden; display: flex; align-items: flex-end; }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-content { background: white; width: 100%; padding: 25px; border-top-left-radius: 25px; border-top-right-radius: 25px; text-align: center; }
        .selected-word-box { background-color: #e3f2fd; border: 1px solid #bbdefb; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .sw-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .audio-btn { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .sw-english { font-family: 'Roboto', sans-serif; font-weight: bold; font-size: 1.4rem; color: var(--accent-color); }
        .sw-arabic { font-family: 'Cairo', sans-serif; font-size: 1.3rem; color: #333; font-weight: bold; display: block; }

        /* ================= إعدادات الطباعة والـ PDF السحرية ================= */
        .print-cover { display: none; }
        
        @media print {
            body { background: white; padding: 0; margin: 0; color: black; }
            .bottom-nav, .sheet-overlay, .toggle-trans-btn, .print-btn-float { display: none !important; }
            
            /* إظهار الغلاف في الطباعة فقط */
            .print-cover { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; page-break-after: always; text-align: center; background: #f8f9fa; border: 2px solid #ddd; border-radius: 10px; margin: 20px;}
            .print-cover h1 { font-size: 3rem; color: #0056b3; margin-bottom: 10px; text-transform: uppercase;}
            .print-cover h2 { font-size: 2rem; color: #333; font-family: 'Cairo'; }
            
            .content-container { max-width: 100%; padding: 0; margin: 0; }
            .print-slide { page-break-after: always; padding: 30px; box-sizing: border-box; }
            .text-block { page-break-inside: avoid; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
            
            /* تصغير الصور حتى لا تنكص وتخرب الورقة */
            .lecture-image { max-height: 400px; width: auto; object-fit: contain; box-shadow: none; border: 2px solid #333; }
            
            /* إظهار الترجمة الكاملة للفقرة إجبارياً في الـ PDF */
            .inline-translation { display: block !important; border: none; border-top: 1px dashed #999; margin-top: 15px; padding-top: 10px; background: transparent; color: #444; }
            
            /* إعدادات كلمات الـ Ruby (الطاقية المترجمة فوك الكلمة) */
            ruby { ruby-align: center; }
            rt { font-size: 0.65em; color: #0056b3; font-family: 'Cairo'; font-weight: bold; letter-spacing: 0px;}
        }
    </style>
</head>
<body>

    <button class="print-btn-float" onclick="printLecture()">
        🖨️ حفظ كـ PDF
    </button>

    <div class="content-container" id="contentArea"></div>

    <div class="bottom-nav">
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">التالي &#8592;</button>
        <div class="page-counter" id="pageIndicator">1</div>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8594; السابق</button>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
        <div class="sheet-content">
            <div style="font-family:'Cairo'; color:#666; margin-bottom:10px;">معنى الكلمة:</div>
            <div id="selectedWordBox" class="selected-word-box">
                <div class="sw-container">
                    <span id="swEnglish" class="sw-english"></span>
                    <button id="audioBtn" class="audio-btn" onclick="playAudio()">🔊</button>
                </div>
                <span id="swArabic" class="sw-arabic"></span>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            "the": "الـ", "of": "من/لـ", "in": "في", "and": "و", "is": "هو/يكون", "are": "هم/يكونون",
            "to": "إلى/لـ", "a": "أداة تنكير", "an": "أداة تنكير", "with": "مع", "without": "بدون",
            "head": "رأس", "neck": "عنق", "chest": "صدر", "abdomen": "بطن", "back": "ظهر",
            "arm": "ذراع", "leg": "ساق", "bone": "عظم", "muscle": "عضلة", "brain": "دماغ",
            "skull": "جمجمة", "blood": "دم", "vein": "وريد", "artery": "شريان", "heart": "قلب",
            "lung": "رئة", "liver": "كبد", "kidney": "كلية", "stomach": "معدة", "pelvis": "حوض",
            "spine": "عمود فقري", "joint": "مفصل", "patient": "مريض", "position": "وضعية",
            "clinical": "سريري", "indications": "دواعي الاستعمال", "radiograph": "صورة شعاعية",
            "x-ray": "أشعة سينية", "mri": "رنين مغناطيسي", "ct": "مفراس"
        };

        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding", "trans": "1.16 ترميز الإشارة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "To explain this subject clearly and easy assimilation, suppose some of the", "trans": "ولشرح هذا الموضوع بشكل واضح وسهل الاستيعاب، افترض بعضا من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "assumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,", "trans": "الافتراضات: النظر في صورة محورية للدماغ باستخدام مغناطيس 1.5 تسلا. أيضًا،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "we work with a homogeneous magnetic field, which covers the whole body from", "trans": "نحن نعمل بمجال مغناطيسي متجانس يغطي الجسم كله منه", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "head to toe. (This is quite different in reality, where there is only a homogenous", "trans": "الرأس إلى أخمص القدمين. (وهذا يختلف تماما في الواقع، حيث لا يوجد سوى متجانس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "sphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,", "trans": "كرة قطرها 40 سم في المركز المتساوي (مركز تجويف التصوير بالرنين المغناطيسي) للمغناطيس،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "but this assumption easy to the explanation and the idea explained). Just as important", "trans": "ولكن هذا الافتراض سهل الشرح وشرح الفكرة). بنفس القدر من الأهمية", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "as the strength of the main magnet is its precision. The straightness of the magnetic", "trans": "لأن قوة المغناطيس الرئيسي هي دقته. استقامة المغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "lines within the center (or, as it is technically known, the iso-center) of the magnet", "trans": "خطوط داخل المركز (أو، كما هو معروف تقنيًا، مركز الأيزو) للمغناطيس", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "needs to be near-perfect. This is known as homogeneity. Fluctuations", "trans": "يجب أن تكون شبه مثالية. وهذا ما يعرف بالتجانس. التقلبات", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(inhomogeneities in the field strength) within the scan region should be less than", "trans": "(عدم التجانس في شدة المجال) داخل منطقة المسح يجب أن يكون أقل من", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "three parts per million (3 ppm). When we put a patient in the magnet, all the protons,", "trans": "ثلاثة أجزاء في المليون (3 جزء في المليون). عندما نضع مريضًا في المغناطيس، جميع البروتونات،", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "from head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz", "trans": "من الرأس إلى أخمص القدمين، محاذاة مع B0. أنها تدور على تردد لارمور 63.6 ميغاهيرتز", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "(Figure 28).", "trans": "(الشكل 28).", "isTitle": false, "isSubTitle": true}, {"type": "image", "src": "images/img_2bbae89b.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "إذا استخدمنا نبضة RF مثيرة تبلغ 90 درجة لقلب المغنطة إلى المستوى xy، إذن", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "سوف تتفاعل جميع البروتونات وتعيد الإشارة. لن يكون لدينا أدنى فكرة عن مكان", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "تأتي الإشارة من: من الرأس أو أخمص القدمين.", "isTitle": false, "isSubTitle": false}]}, {"content": [{"type": "text", "text": "1.16.1 Slice Encoding Gradient", "trans": "1.16.1 تدرج ترميز الشريحة", "isTitle": true, "isSubTitle": false}, {"type": "text", "text": "The magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is", "trans": "يتم تطبيق تدرج المجال المغناطيسي (على سبيل المثال، التدرج Z) مؤقتًا (التدرج Z هو", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "switched on) at the same time as the RF pulse (see figure 29).", "trans": "قيد التشغيل) في نفس الوقت الذي يتم فيه نبض التردد اللاسلكي (انظر الشكل 29).", "isTitle": false, "isSubTitle": false}, {"type": "image", "src": "images/img_9c594f26.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then", "trans": "إذا استخدمنا نبضة RF مثيرة تبلغ 90 درجة لقلب المغنطة إلى المستوى xy، إذن", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "all the protons would react and return a signal. We would have no clue where the", "trans": "سوف تتفاعل جميع البروتونات وتعيد الإشارة. لن يكون لدينا أدنى فكرة عن مكان", "isTitle": false, "isSubTitle": false}, {"type": "text", "text": "signal comes from: from head or toe.", "trans": "تأتي الإشارة من: من الرأس أو أخمص القدمين.", "isTitle": false, "isSubTitle": false}]}];
        let currentIndex = 0;

        function renderPage() {
            try {
                const container = document.getElementById('contentArea');
                const data = pages[currentIndex];
                
                document.getElementById('pageIndicator').innerText = (currentIndex + 1) + " / " + pages.length;
                document.getElementById('prevBtn').disabled = currentIndex === 0;
                document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;

                let html = '';
                
                data.content.forEach((item, idx) => {
                    if (item.type === 'image') {
                        html += `<div class="lecture-image-container"><img src="${item.src}" class="lecture-image"></div>`;
                    } else {
                        let cssClass = "english-paragraph";
                        if (item.isTitle) cssClass = "title-text";
                        if (item.isSubTitle) cssClass = "sub-title";

                        let formattedBlock = '';
                        let actualLines = item.text.split('\n').join('\n').split('\n');
                        
                        actualLines.forEach(line => {
                            let interactiveText = '';
                            let words = line.split(' ');
                            words.forEach(word => {
                                let clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                                if (clean && /[a-z]/i.test(clean)) {
                                    let safeWord = word.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                                    interactiveText += `<span class="interactive-word" onclick="showWordMeaning('${clean}', '${safeWord}')">${word}</span> `;
                                } else {
                                    interactiveText += `${word} `; 
                                }
                            });
                            formattedBlock += `<div>${interactiveText}</div>`;
                        });

                        let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                        html += `
                            <div class="text-block">
                                <div class="${cssClass}">
                                    ${formattedBlock}
                                </div>
                                <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${idx}')">
                                    إظهار الترجمة &#11015;
                                </button>
                                <div id="trans-${idx}" class="inline-translation">
                                    ${transFormatted}
                                </div>
                            </div>
                        `;
                    }
                });

                container.innerHTML = html;
                window.scrollTo(0,0);
            } catch(err) {
                console.error(err);
            }
        }

        // ================= دالة الحفظ كـ PDF (الطباعة الذكية) =================
        function printLecture() {
            const container = document.getElementById('contentArea');
            
            // 1. إضافة الغلاف الأمامي للملزمة
            let html = `
                <div class="print-cover">
                    <h2 style="color: #666; margin-bottom:0;">Radiology & Sonar Lecture</h2>
                    <h1 style="font-family:'Segoe UI', Arial, sans-serif;">FF</h1>
                    <h3 style="font-family:'Cairo'; color:#444;">ملزمة مترجمة وتفاعلية</h3>
                    <p style="font-family:'Cairo'; margin-top:50px; color:#888;">تم الإنشاء بواسطة الذكاء الاصطناعي</p>
                </div>
            `;

            // 2. دمج جميع السلايدات في صفحة واحدة للطباعة مع كلمات الـ Ruby
            pages.forEach((data, pageIndex) => {
                html += '<div class="print-slide">';
                data.content.forEach((item, idx) => {
                    if (item.type === 'image') {
                        html += `<div class="lecture-image-container"><img src="${item.src}" class="lecture-image"></div>`;
                    } else {
                        let cssClass = "english-paragraph";
                        if (item.isTitle) cssClass = "title-text";
                        if (item.isSubTitle) cssClass = "sub-title";

                        let formattedBlock = '';
                        let actualLines = item.text.split('\n').join('\n').split('\n');
                        
                        actualLines.forEach(line => {
                            let interactiveText = '';
                            let words = line.split(' ');
                            words.forEach(word => {
                                let clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                                let trans = dictionary[clean]; // سحب الترجمة من القاموس المدمج
                                
                                // إذا الكلمة موجودة بالقاموس، نلبسها "طاقية" الـ ruby
                                if (clean && /[a-z]/i.test(clean) && trans) {
                                    interactiveText += `<ruby>${word}<rt>${trans}</rt></ruby> `;
                                } else {
                                    interactiveText += `${word} `; 
                                }
                            });
                            formattedBlock += `<div>${interactiveText}</div>`;
                        });

                        let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                        html += `
                            <div class="text-block">
                                <div class="${cssClass}">
                                    ${formattedBlock}
                                </div>
                                <div class="inline-translation">
                                    <strong style="color:#0056b3;">الترجمة:</strong><br>${transFormatted}
                                </div>
                            </div>
                        `;
                    }
                });
                html += '</div>'; // نهاية السلايد الحالي
            });

            // 3. عرض كل شيء في الشاشة لثانية واحدة للطباعة
            container.innerHTML = html;
            
            // 4. استدعاء نافذة الحفظ/الطباعة بعد تحميل الصور مباشرة
            setTimeout(() => {
                window.print();
                
                // 5. بعد ما يغلق الطالب نافذة الطباعة، نرجع الموقع لشكله التفاعلي
                renderPage();
            }, 500);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        let currentWordForAudio = "";

        async function showWordMeaning(cleanWord, originalWord) {
            currentWordForAudio = originalWord.replace(/[^a-zA-Z]/g, '');
            const enSpan = document.getElementById('swEnglish');
            const arSpan = document.getElementById('swArabic');
            
            enSpan.innerText = currentWordForAudio;
            const overlay = document.getElementById('sheetOverlay');
            overlay.classList.add('active');

            if (dictionary[cleanWord]) {
                arSpan.innerText = dictionary[cleanWord];
            } else {
                arSpan.innerText = "جاري الترجمة... ⏳";
                try {
                    let res = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=' + encodeURIComponent(cleanWord));
                    let data = await res.json();
                    if(data && data[0] && data[0][0] && data[0][0][0]) {
                        let translation = data[0][0][0];
                        arSpan.innerText = translation;
                        dictionary[cleanWord] = translation; 
                    } else {
                        arSpan.innerText = "---";
                    }
                } catch(e) {
                    arSpan.innerText = "خطأ بالاتصال بالنت";
                }
            }
        }

        function playAudio() {
            if (currentWordForAudio) {
                const utterance = new SpeechSynthesisUtterance(currentWordForAudio);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function closeSheet(e) {
            if (e.target.id === 'sheetOverlay') {
                const overlay = document.getElementById('sheetOverlay');
                overlay.classList.remove('active');
            }
        }

        function changePage(dir) {
            currentIndex += dir;
            renderPage();
        }

        renderPage();

    </script>
</body>
</html>
