<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاضرة الأشعة التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --accent-color: #0056b3;
            --trans-bg: #f8f9fa;
            --trans-border: #0056b3;
            --nav-bg: #f8f9fa;
            --highlight: #e8f0fe;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Roboto', 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 90px;
            min-height: 100vh;
            overscroll-behavior-y: none;
        }

        .content-container {
            padding: 20px 20px;
            max-width: 800px;
            margin: 0 auto;
            direction: ltr;
        }

        .text-block {
            margin-bottom: 25px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 15px;
        }

        .title-text {
            font-weight: bold;
            font-size: 1.6rem;
            color: #000;
            margin-bottom: 15px;
            display: block;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            direction: ltr;
        }

        .sub-title {
            font-weight: bold;
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-top: 20px;
            margin-bottom: 10px;
            display: block;
            direction: ltr;
        }

        .english-paragraph {
            line-height: 2.0;
            font-size: 1.25rem;
            color: #333;
            margin-bottom: 8px;
            text-align: left;
        }

        .interactive-word {
            cursor: pointer;
            border-bottom: 1px dotted #999;
            transition: background 0.2s;
        }
        .interactive-word:hover {
            background-color: #e3f2fd;
            color: var(--accent-color);
        }
        .interactive-word:active {
            background-color: var(--accent-color);
            color: white;
        }

        .toggle-trans-btn {
            background: none;
            border: none;
            color: #666;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 0;
            direction: rtl;
            width: 100%;
            transition: color 0.2s;
        }
        
        .toggle-trans-btn:hover {
            color: var(--accent-color);
        }

        .inline-translation {
            display: none;
            background-color: var(--trans-bg);
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-top: 5px;
            border-right: 4px solid var(--trans-border);
            font-family: 'Cairo', sans-serif;
            font-size: 1.15rem;
            line-height: 1.6;
            direction: rtl;
            text-align: justify;
            animation: fadeIn 0.3s ease-in-out;
        }

        .lecture-image-container {
            width: 100%;
            margin: 20px 0;
            text-align: center;
        }
        .lecture-image {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--nav-bg);
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            z-index: 1000;
            direction: rtl;
        }

        .nav-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .nav-btn:disabled {
            background-color: #e0e0e0;
            color: #999;
            box-shadow: none;
        }
        .page-counter {
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            color: #555;
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 15px;
        }

        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            opacity: 0; visibility: hidden; transition: all 0.3s;
            display: flex; align-items: flex-end;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-content {
            background: white; width: 100%; padding: 25px;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            transform: translateY(100%); transition: transform 0.3s;
            text-align: center;
        }
        .sheet-overlay.active .sheet-content { transform: translateY(0); }
        
        .selected-word-box {
            background-color: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 15px; border-radius: 12px;
            margin-top: 10px;
        }
        .sw-container {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px;
        }
        .audio-btn {
            background: none; border: none; cursor: pointer; font-size: 1.5rem; color: var(--accent-color);
        }
        .sw-english {
            font-family: 'Roboto', sans-serif; font-weight: bold; font-size: 1.4rem; color: var(--accent-color);
        }
        .sw-arabic {
            font-family: 'Cairo', sans-serif; font-size: 1.3rem; color: #333; font-weight: bold; display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                </div>
                <span id="swArabic" class="sw-arabic"></span>

    </div>

        const pages = [{"content": [{"type": "text", "text": "1.16 Signal Coding  \nTo explain this subject clearly and easy assimilation, suppose some of the  \nassumptions: considering an axial image of the brain using a 1.5 Tesla magnet. Also,  \nwe work with a homogeneous magnetic field, which covers the whole body from  \nhead to toe. (This is quite different in reality, where there is only a homogenous  \nsphere of 40 cm in diameter in the iso-centre (center of the MRI bore) of the magnet,  \nbut this assumption easy to the explanation and the idea explained). Just as important  \nas the strength of the main magnet is its precision. The straightness of the magnetic  \nlines within the center (or, as it is technically known, the iso-center) of the magnet  \nneeds to be near-perfect. This is known as homogeneity. Fluctuations  \n(inhomogeneities in the field strength) within the scan region should be less than  \nthree parts per million (3 ppm). When we put a patient in the magnet, all the protons,  \nfrom head to toe, align with B0. They spin at the Larmor frequency of 63.6 MHz  \n(Figure 28).", "trans": "", "isTitle": true, "isSubTitle": false}, {"type": "image", "src": "images/img_fb551125.jpg"}, {"type": "text", "text": "If we use a 90o excitation RF-pulse to flip the magnetization into the x-y plane, then  \nall the protons would react and return a signal. We would have no clue where the  \nsignal comes from: from head or toe.", "trans": "", "isTitle": false, "isSubTitle": false}]}, {"content": [{"type": "text", "text": "1.16.1 Slice Encoding Gradient  \nThe magnetic field gradient (e.g., Z-gradient) is temporarily applied (Z-gradient is  \nswitched on) at the same time as the RF pulse (see figure 29).", "trans": "", "isTitle": true, "isSubTitle": false}, {"type": "image", "src": "images/img_4cbec8c8.jpg"}, {"type": "text", "text": "This will generate an additional magnetic field in the Z-direction, which is  \nsuperimposed on Bo. The indication +Gz in Figure 29 means there is a slightly  \nstronger Bo field in the head as there is in the iso-center of the magnet. A stronger  \nBo field means a higher Larmor frequency. Along the entire the slope of the gradient  \nthere is a different Bo field and consequently the protons spin at slightly different  \nfrequencies. Therefore, the protons in the head will spin slightly faster than the ones  \nin the iso-center. The reverse goes for the protons in the feet. Figure 28 shows that  \nthe protons in the feet now spin at 63.5 MHz, the ones in the iso-center of the magnet  \nstill at 63.6 MHz and the ones in the head with 63.7 MHz  \nThis means we can \"pick out\" the section which we want to excite by choosing the  \nright frequency range of RF excitation pulse. The section which contains Larmor \nfrequencies which match the frequencies of the oscillating magnetic field will  \nrespond. An MRI signal will be generated only from that section of the patient. This  \nis called Slice-Encoding or Slice-Selection. Usually, the slice selection gradient is  \napplied in the z-axis-the head-foot direction in the scanner. But because a gradient", "trans": "", "isTitle": false, "isSubTitle": false}]}];
        let currentIndex = 0;

        function renderPage() {
            const container = document.getElementById('contentArea');
            const data = pages[currentIndex];
            
            document.getElementById('pageIndicator').innerText = `${currentIndex + 1} / ${pages.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;

            let html = '';
            
            data.content.forEach((item, idx) => {
                if (item.type === 'image') {
                    html += `
                        <div class="lecture-image-container">
                            <img src="${item.src}" alt="Lecture Figure" class="lecture-image">
                        </div>
                    `;
                } else {
                    let cssClass = "english-paragraph";
                    if (item.isTitle) cssClass = "title-text";
                    if (item.isSubTitle) cssClass = "sub-title";

                    const lines = item.text.split('\n');
                    let formattedBlock = '';
                    
                    lines.forEach(line => {
                        const words = line.split(' ');
                        let interactiveText = '';
                        words.forEach(word => {
                            const cleanWordForLookup = word.replace(/[.,()?!:;“”"°\[\]*\-0-9]/g, '').toLowerCase();
                            
                            if (cleanWordForLookup && /[a-z]/i.test(cleanWordForLookup)) {
                                interactiveText += `<span class="interactive-word" onclick="showWordMeaning('${cleanWordForLookup}', '${word.replace(/'/g, "\\'")}')">${word}</span> `;
                            } else {
                                interactiveText += `${word} `; 
                            }
                        });
                        formattedBlock += `<div>${interactiveText}</div>`;
                    });

                    let transFormatted = item.trans.replace(/\n/g, '<br>');

                    html += `
                        <div class="text-block">
                            <div class="${cssClass}">
                                ${formattedBlock}
                            </div>
                            <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${idx}')">
                                إظهار الترجمة &#11015;
                            </button>
                            <div id="trans-${idx}" class="inline-translation">
                                ${transFormatted}
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        let currentWordForAudio = "";

        function showWordMeaning(cleanWord, originalWord) {
            // البحث في القاموس، وإذا لم توجد الكلمة نضع "---"
            const translation = dictionary[cleanWord] || "---"; 
            
            currentWordForAudio = originalWord.replace(/[.,()?!:;“”"°\[\]*|]/g, '');

            const box = document.getElementById('selectedWordBox');
            const enSpan = document.getElementById('swEnglish');
            const arSpan = document.getElementById('swArabic');

            enSpan.innerText = currentWordForAudio; 
            arSpan.innerText = translation;

            const overlay = document.getElementById('sheetOverlay');
            overlay.classList.add('active');
        }

        function playAudio() {
            if (currentWordForAudio) {
                const utterance = new SpeechSynthesisUtterance(currentWordForAudio);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function closeSheet(e) {
            if (e.target.id === 'sheetOverlay') {
                const overlay = document.getElementById('sheetOverlay');
                overlay.classList.remove('active');
            }
        }

        function changePage(dir) {
            currentIndex += dir;
            renderPage();
        }

        renderPage();

    </script>
